# Telegram reminders every 15 minutes.
# Required on Vercel Hobby — see README "Cron jobs".
#
# Secrets: CRON_SECRET, APP_URL (https://your-app.vercel.app)

name: Cron — Telegram reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/telegram-reminders
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/telegram-reminders"
